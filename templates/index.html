<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emotion Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3.0">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 class="logo">AI Detector</h2>
        </div>

        <div class="sidebar-footer">
            <p>Powered by SVC AI Models</p>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <div class="center-wrapper">

            <!-- HEADER (Hero Section) -->
            <header class="page-header">
                <h1 class="main-heading">AI Emotion Detector</h1>
                <p class="sub-heading">Analyse your Emotion with AI</p>
            </header>

            <!-- APP CARD -->
            <section class="app-container">

                <!-- FORM -->
                <form action="/predict" method="POST" class="input-form">
                    <textarea name="text_input" placeholder="Write any sentence here..."
                        required>{{ original_text if original_text }}</textarea>

                    <button type="submit" class="analyze-btn">
                        Analyse Emotion
                    </button>
                </form>

                <!-- RESULT -->
                {% if prediction %}
                <div class="result-display">
                    <p class="res-label">AI PREDICTION</p>

                    <div class="res-content">
                        <span class="res-text">{{ prediction }}</span>
                        <span class="res-emoji">{{ emoji }}</span>
                    </div>
                </div>
                {% endif %}

                <!-- WARNING -->
                {% if warning %}
                <div class="alert-box">
                    {{ warning }}
                </div>
                {% endif %}

            </section>

        </div>

    </main>

</body>

</html>
